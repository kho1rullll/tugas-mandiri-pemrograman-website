<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Sistem Reminder Imunisasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f7f6] min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="flex w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <div class="hidden md:flex w-1/2 bg-[#003366] flex-col justify-center items-center p-12 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-t from-[#003366] to-[#00a2ff] opacity-80"></div>
            <div class="relative z-10">
                <h2 class="text-3xl font-bold text-white mb-4">Bergabunglah Bersama Kami</h2>
                <p class="text-blue-100">Dapatkan notifikasi tepat waktu untuk setiap jadwal imunisasi keluarga Anda.</p>
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 lg:p-12 overflow-y-auto max-h-[90vh]">
            <h2 class="text-3xl font-bold text-[#003366] mb-2">Buat Akun Baru</h2>
            <p class="text-gray-500 mb-8">Lengkapi data di bawah ini untuk mendaftar.</p>

            <form id="formRegister">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                    <input type="text" id="namaRegister" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-[#00a2ff] focus:ring-1 focus:ring-[#00a2ff] transition" placeholder="Contoh: Khoirulbarie Kholifatul">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="emailRegister" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-[#00a2ff] focus:ring-1 focus:ring-[#00a2ff] transition" placeholder="email@contoh.com">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="passwordRegister" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-[#00a2ff] focus:ring-1 focus:ring-[#00a2ff] transition" placeholder="Buat password (min. 8 karakter)">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-[#003366] to-[#00a2ff] text-white font-bold py-3 rounded-lg hover:opacity-90 transition transform hover:-translate-y-0.5 shadow-lg">
                    Daftar Sekarang
                </button>
            </form>

            <p class="text-center text-sm text-gray-600 mt-8">
                Sudah punya akun? <a href="login.html" class="text-[#00a2ff] font-semibold hover:underline">Masuk di sini</a>
            </p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
